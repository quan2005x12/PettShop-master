<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng nhập - PETT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#006b5f",
                        background: "#f8f7f0",
                        surface: "#ffffff",
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans"],
                        body: ["Be Vietnam Pro"],
                    },
                },
            },
        };
    </script>
    <style>
        .login-card {
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05), 0 20px 40px -10px rgba(0,0,0,0.1);
        }
        .bg-pattern {
            background-color: #f8f7f0;
            background-image: radial-gradient(#006b5f10 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-pattern font-body min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Top Nav -->
    <nav class="absolute top-0 left-0 w-full p-6 flex items-center justify-between z-20">
        <div class="flex items-center gap-4">
            <a href="/" data-route="/" class="flex items-center group">
                <span class="material-symbols-outlined text-stone-500 group-hover:text-primary transition-colors">arrow_back</span>
            </a>
        </div>
    </nav>

    <!-- Login Card -->
    <div class="login-card bg-surface rounded-[2.5rem] p-10 md:p-16 max-w-lg w-full text-center relative z-10">
        <h1 class="text-4xl font-headline font-black tracking-tight text-stone-800 mb-2">Chào mừng!</h1>
        <p class="text-stone-500 mb-10">Đăng nhập để chăm sóc thú cưng của bạn.</p>

        <button class="w-full flex items-center justify-center gap-3 bg-stone-50 hover:bg-stone-100 border border-stone-200 py-4 rounded-2xl transition-all active:scale-[0.98]" data-action="google-login">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" class="w-6 h-6">
            <span class="font-bold text-stone-700">Đăng nhập với Google</span>
        </button>
    </div>

    <!-- Paw Print Decoration -->
    <div class="absolute bottom-10 right-10 opacity-[0.03] rotate-12 pointer-events-none">
        <span class="material-symbols-outlined text-[200px]" style="font-variation-settings: 'FILL' 1;">pets</span>
    </div>

</body>
</html>
