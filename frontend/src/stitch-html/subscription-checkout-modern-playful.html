<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Thanh toán nhanh - PETT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#006b5f",
                        "primary-container": "#14b8a6",
                        background: "#fbfaee",
                        surface: "#ffffff",
                    },
                    borderRadius: {
                        xl: "2rem",
                        "2xl": "3rem",
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans"],
                        body: ["Be Vietnam Pro"],
                    },
                },
            },
        };
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #fbfaee; overflow-x: hidden; }
        
        .checkout-card {
            background: #ffffff;
            border: 1px solid rgba(0, 107, 95, 0.05);
            box-shadow: 0 40px 100px -20px rgba(0, 66, 59, 0.08);
            border-radius: 3rem;
        }

        .input-compact {
            background: #f8f8f2;
            border: 1.5px solid transparent;
            border-radius: 1.25rem;
            padding: 0.875rem 1.25rem;
            transition: all 0.2s ease;
            width: 100%;
            font-size: 0.95rem;
        }
        .input-compact:focus {
            background: #ffffff;
            border-color: #14b8a6;
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);
            outline: none;
        }

        .momo-btn {
            background: linear-gradient(135deg, #af2070 0%, #d82d8b 100%);
            box-shadow: 0 12px 30px -5px rgba(175, 32, 112, 0.3);
        }

        #success-overlay {
            display: none;
            backdrop-filter: blur(12px);
            background: rgba(251, 250, 238, 0.8);
        }
        #success-overlay.show {
            display: flex;
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="checkout-card max-w-lg w-full p-8 md:p-10 relative overflow-hidden">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-headline font-black text-primary tracking-tight">Thanh toán nhanh</h1>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Xác nhận đăng ký gói</p>
            </div>
            <div class="w-12 h-12 bg-primary/5 rounded-2xl flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-2xl">shield_with_heart</span>
            </div>
        </div>

        <div id="plan-info" class="flex gap-4 p-6 bg-primary/5 rounded-[2rem] border border-primary/10 mb-8 items-center">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm flex-shrink-0">
                <span id="plan-icon" class="material-symbols-outlined text-3xl text-primary">potted_plant</span>
            </div>
            <div class="grow">
                <h3 id="plan-name" class="font-black text-on-surface text-lg leading-tight">Đang tải...</h3>
                <p id="plan-price" class="text-primary font-black text-xl">0đ</p>
            </div>
        </div>

        <form id="express-checkout-form" class="space-y-4">
            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="checkout-contact-name" class="input-compact" placeholder="Họ và tên của bạn" required>
                <input type="tel" id="checkout-contact-phone" class="input-compact" placeholder="Số điện thoại liên hệ" required>
                <textarea id="checkout-address-line" rows="2" class="input-compact" placeholder="Địa chỉ giao nhận quà tặng hàng tháng" required></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" class="momo-btn w-full py-5 text-white font-black text-lg rounded-2xl flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all">
                    <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" class="w-6 h-6 object-contain brightness-0 invert" alt="MoMo">
                    Thanh toán MoMo
                </button>
            </div>
        </form>

        <div id="success-overlay" class="absolute inset-0 z-50 flex-col items-center justify-center text-center p-10">
            <div class="w-24 h-24 bg-primary text-white rounded-full flex items-center justify-center mb-6 shadow-2xl shadow-primary/30 scale-110">
                <span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
            <h2 class="text-3xl font-headline font-black text-slate-900 mb-2">Thành công!</h2>
            <p class="text-slate-500 font-medium mb-8">Gói định kỳ của bạn đã được kích hoạt. Hãy đón chờ những phần quà hàng tháng nhé!</p>
            <button onclick="window.parent.postMessage({type: 'PETT_SUCCESS_CLOSE'}, '*')" class="w-full py-4 bg-white text-primary border-2 border-primary/20 font-black rounded-2xl hover:bg-primary/5 transition-all">
                Về trang hồ sơ
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('express-checkout-form');
        const overlay = document.getElementById('success-overlay');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            
            setTimeout(() => {
                overlay.classList.add('show');
                window.parent.postMessage({
                    type: 'PETT_SUBSCRIPTION_COMPLETED',
                    data: {
                        name: document.getElementById('checkout-contact-name').value,
                        phone: document.getElementById('checkout-contact-phone').value,
                        address: document.getElementById('checkout-address-line').value
                    }
                }, '*');
            }, 1200);
        });

        const updateUI = (item) => {
            document.getElementById('plan-name').textContent = item.name;
            document.getElementById('plan-price').textContent = item.priceLabel;
            
            const iconEl = document.getElementById('plan-icon');
            if (item.name.toLowerCase().includes('basic')) iconEl.textContent = 'potted_plant';
            else if (item.name.toLowerCase().includes('pro')) iconEl.textContent = 'award_star';
            else iconEl.textContent = 'workspace_premium';
        };

        // Listen for data
        window.addEventListener('message', (event) => {
            if (event.data.type === 'PETT_HYDRATE_SUBSCRIPTION') {
                updateUI(event.data.item);
            }
        });

        // Robust fallback: Ask parent for data immediately
        window.parent.postMessage({ type: 'PETT_CHECKOUT_READY' }, '*');
    </script>
</body>
</html>
